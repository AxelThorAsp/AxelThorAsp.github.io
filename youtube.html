<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YouTube Embedder</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    max-width: 640px;
    margin: 2rem auto;
    padding: 1rem;
    background: #fff;
    color: #111;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #121212; color: #eee; }
    input, button {
      background: #1e1e1e;
      color: #eee;
      border: 1px solid #444;
    }
  }
  .row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
  input { flex: 1; padding: 0.5rem; font-size: 1rem; }
  button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
  #error { color: #e55; min-height: 1.5em; margin-bottom: 0.5rem; }
  #videoContainer iframe {
    width: 100%;
    aspect-ratio: 16 / 9;
    border: 0;
  }
  #videoContainer iframe.shorts {
    aspect-ratio: 9 / 16;
    max-width: 360px;
  }
</style>
</head>
<body>
  <div class="row">
    <input id="youtubeLink" type="text" placeholder="Paste a YouTube URL…" />
    <button id="embedButton">Embed</button>
  </div>
  <div id="error" role="alert"></div>
  <div id="videoContainer"></div>

<script>
const DEFAULT_TITLE = "YouTube Embedder";

// "42", "42s", "1m30s", "1h2m3s" -> seconds
function parseTimestamp(t) {
  if (!t) return 0;
  if (/^\d+$/.test(t)) return parseInt(t, 10);
  const m = t.match(/(?:(\d+)h)?(?:(\d+)m)?(?:(\d+)s)?/);
  if (!m) return 0;
  return (+m[1] || 0) * 3600 + (+m[2] || 0) * 60 + (+m[3] || 0);
}

function parseYouTube(link) {
  try {
    const url = new URL(link);
    const start = parseTimestamp(url.searchParams.get("t"));
    const v = url.searchParams.get("v");
    if (v) return { id: v, shorts: false, start };
    const shortsMatch = url.pathname.match(/^\/shorts\/([^/?]+)/);
    if (shortsMatch) return { id: shortsMatch[1], shorts: true, start };
    if (url.hostname.includes("youtu.be")) {
      const id = url.pathname.slice(1).split("/")[0];
      if (id) return { id, shorts: false, start };
    }
    const embedMatch = url.pathname.match(/^\/embed\/([^/?]+)/);
    if (embedMatch) return { id: embedMatch[1], shorts: false, start };
    return null;
  } catch {
    return null;
  }
}

async function fetchTitle(link) {
  try {
    const endpoint = `https://www.youtube.com/oembed?url=${encodeURIComponent(link)}&format=json`;
    const res = await fetch(endpoint);
    if (!res.ok) return null;
    const data = await res.json();
    return data.title || null;
  } catch {
    return null;
  }
}

const input = document.getElementById("youtubeLink");
const errorEl = document.getElementById("error");
const container = document.getElementById("videoContainer");

// Tracks the latest embed request so stale title responses don't overwrite newer ones
let currentLink = null;

function embedVideo(link, { fromHistory = false } = {}) {
  errorEl.textContent = "";
  const info = parseYouTube(link);
  if (!info) {
    errorEl.textContent = "Couldn't find a video ID in that URL.";
    container.innerHTML = "";
    document.title = DEFAULT_TITLE;
    currentLink = null;
    return;
  }

  if (input.value !== link) input.value = link;

  if (!fromHistory) {
    const url = new URL(window.location.href);
    if (url.searchParams.get("joni") !== link) {
      url.searchParams.set("joni", link);
      history.pushState(null, "", url);
    }
  }

  const cls = info.shorts ? "shorts" : "";
  const src = `https://www.youtube-nocookie.com/embed/${info.id}?autoplay=1`
            + (info.start ? `&start=${info.start}` : "");
  container.innerHTML =
    `<iframe class="${cls}" src="${src}" ` +
    `allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" ` +
    `allowfullscreen></iframe>`;

  // Reset tab title while we fetch so the old one doesn't linger
  document.title = DEFAULT_TITLE;
  currentLink = link;

  fetchTitle(link).then((title) => {
    if (link !== currentLink || !title) return; // newer embed happened, or fetch failed
    document.title = title;
  });
}

document.getElementById("embedButton").addEventListener("click", () => embedVideo(input.value.trim()));
input.addEventListener("keydown", (e) => { if (e.key === "Enter") embedVideo(input.value.trim()); });

input.addEventListener("paste", (e) => {
  const pasted = (e.clipboardData || window.clipboardData).getData("text").trim();
  if (pasted) {
    e.preventDefault();
    embedVideo(pasted);
  }
});

input.addEventListener("focus", () => input.select());

window.addEventListener("popstate", () => {
  const link = new URLSearchParams(window.location.search).get("joni");
  if (link) {
    embedVideo(link, { fromHistory: true });
  } else {
    input.value = "";
    container.innerHTML = "";
    errorEl.textContent = "";
    document.title = DEFAULT_TITLE;
    currentLink = null;
  }
});

window.addEventListener("load", () => {
  const link = new URLSearchParams(window.location.search).get("joni");
  if (link) {
    input.value = link;
    embedVideo(link, { fromHistory: true });
  } else {
    input.focus();
  }
});
</script>
</body>
</html>
