<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YouTube Embedder</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    max-width: 640px;
    margin: 2rem auto;
    padding: 1rem;
    background: #fff;
    color: #111;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #121212; color: #eee; }
    input, button {
      background: #1e1e1e;
      color: #eee;
      border: 1px solid #444;
    }
  }
  .row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
  input { flex: 1; padding: 0.5rem; font-size: 1rem; }
  button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
  #error { color: #e55; min-height: 1.5em; margin-bottom: 0.5rem; }
  #videoContainer iframe {
    width: 100%;
    aspect-ratio: 16 / 9;
    border: 0;
  }
  #videoContainer iframe.shorts {
    aspect-ratio: 9 / 16;
    max-width: 360px;
  }
</style>
</head>
<body>
  <div class="row">
    <input id="youtubeLink" type="url" inputmode="url" autocomplete="off"
           spellcheck="false" placeholder="Paste a YouTube URL…" />
    <button id="embedButton">Embed</button>
  </div>
  <div id="error" role="alert"></div>
  <div id="videoContainer"></div>

<script>
const DEFAULT_TITLE = "YouTube Embedder";
const VIDEO_ID_RE = /^[A-Za-z0-9_-]{11}$/;
const isValidId = (id) => typeof id === "string" && VIDEO_ID_RE.test(id);

// "42", "42s", "1m30s", "1h2m3s" -> seconds. Returns 0 for unrecognized input.
function parseTimestamp(t) {
  if (!t) return 0;
  const s = String(t).trim();
  if (/^\d+$/.test(s)) return parseInt(s, 10);
  // Anchored so garbage like "1h2x3m" doesn't partial-match
  const m = s.match(/^(?:(\d+)h)?(?:(\d+)m)?(?:(\d+)s)?$/);
  if (!m) return 0;
  return (+m[1] || 0) * 3600 + (+m[2] || 0) * 60 + (+m[3] || 0);
}

function parseYouTube(link) {
  try {
    const url = new URL(link);
    const host = url.hostname.toLowerCase();

    // Timestamp from ?t= or #t= (older share format uses the hash)
    const hashT = url.hash.startsWith("#t=") ? url.hash.slice(3) : null;
    const start = parseTimestamp(url.searchParams.get("t") || hashT);

    // youtube.com/watch?v=ID (also m.*, music.*)
    const v = url.searchParams.get("v");
    if (isValidId(v)) return { id: v, shorts: false, start };

    // youtu.be/ID — exact hostname match, not substring (prevents host spoofing)
    if (host === "youtu.be" || host.endsWith(".youtu.be")) {
      const id = url.pathname.slice(1).split("/")[0];
      if (isValidId(id)) return { id, shorts: false, start };
    }

    // Path-based forms: /shorts/ID, /live/ID, /embed/ID
    const paths = [
      { re: /^\/shorts\/([^/?]+)/, shorts: true },
      { re: /^\/live\/([^/?]+)/, shorts: false },
      { re: /^\/embed\/([^/?]+)/, shorts: false },
    ];
    for (const { re, shorts } of paths) {
      const m = url.pathname.match(re);
      if (m && isValidId(m[1])) return { id: m[1], shorts, start };
    }

    return null;
  } catch {
    return null;
  }
}

async function fetchTitle(link) {
  try {
    const endpoint = `https://www.youtube.com/oembed?url=${encodeURIComponent(link)}&format=json`;
    const res = await fetch(endpoint);
    if (!res.ok) return null;
    const data = await res.json();
    return data.title || null;
  } catch {
    return null;
  }
}

const input = document.getElementById("youtubeLink");
const errorEl = document.getElementById("error");
const container = document.getElementById("videoContainer");

// Tracks the latest embed request so stale title responses don't overwrite newer ones
let currentLink = null;

function embedVideo(link, { fromHistory = false } = {}) {
  errorEl.textContent = "";
  const info = parseYouTube(link);
  if (!info) {
    errorEl.textContent = "Couldn't find a video ID in that URL.";
    container.innerHTML = "";
    document.title = DEFAULT_TITLE;
    currentLink = null;
    return;
  }

  if (input.value !== link) input.value = link;

  if (!fromHistory) {
    const url = new URL(window.location.href);
    if (url.searchParams.get("joni") !== link) {
      url.searchParams.set("joni", link);
      history.pushState(null, "", url);
    }
  }

  // ID is validated against [A-Za-z0-9_-]{11} so direct interpolation is safe
  const cls = info.shorts ? "shorts" : "";
  const src = `https://www.youtube-nocookie.com/embed/${info.id}?autoplay=1`
            + (info.start ? `&start=${info.start}` : "");
  container.innerHTML =
    `<iframe class="${cls}" src="${src}" title="YouTube video player" ` +
    `allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" ` +
    `allowfullscreen></iframe>`;

  // Reset tab title while we fetch so the old one doesn't linger
  document.title = DEFAULT_TITLE;
  currentLink = link;

  fetchTitle(link).then((title) => {
    if (link !== currentLink || !title) return;
    document.title = title;
  });
}

document.getElementById("embedButton").addEventListener("click", () => embedVideo(input.value.trim()));
input.addEventListener("keydown", (e) => { if (e.key === "Enter") embedVideo(input.value.trim()); });

input.addEventListener("paste", (e) => {
  const clipboard = e.clipboardData || window.clipboardData;
  if (!clipboard) return;
  const pasted = (clipboard.getData("text") || "").trim();
  if (pasted) {
    e.preventDefault();
    embedVideo(pasted);
  }
});

input.addEventListener("focus", () => input.select());

window.addEventListener("popstate", () => {
  const link = new URLSearchParams(window.location.search).get("joni");
  if (link) {
    embedVideo(link, { fromHistory: true });
  } else {
    input.value = "";
    container.innerHTML = "";
    errorEl.textContent = "";
    document.title = DEFAULT_TITLE;
    currentLink = null;
  }
});

window.addEventListener("load", () => {
  const link = new URLSearchParams(window.location.search).get("joni");
  if (link) {
    input.value = link;
    embedVideo(link, { fromHistory: true });
  } else {
    input.focus();
  }
});
</script>
</body>
</html>
